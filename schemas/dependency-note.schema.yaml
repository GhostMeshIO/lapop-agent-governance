# schemas/dependency-note.schema.yaml
#
# Canonical shared Dependency_Note schema for lapop-agent-governance.
#
# Purpose:
#   Dependency_Note is the structured cross-boundary request object used when
#   an agent, worker, layer, or artifact requires a change outside its assigned
#   boundary. It prevents unauthorized edits while preserving coordination intent.
#
# Status:
#   v0.2 schema-normalization candidate

schema_id: dependency-note
schema_version: "0.2.0"
schema_kind: canonical_shared_schema
schema_owner: CDO-003
schema_status: draft

title: Dependency_Note
description: >
  Structured cross-boundary dependency request used by CDO, LAPOP, CHL, TGL,
  SLL, EIL, and PCL. Dependency notes allow agents to request changes to
  unowned artifacts, schemas, interfaces, validation logic, policy state,
  temporal state, strategy state, documentation, or collaboration process
  without violating artifact boundaries.

type: object
additionalProperties: false

required:
  - note_id
  - source
  - target
  - priority
  - blocking
  - dependency_type
  - lifecycle_state
  - summary
  - required_change
  - justification
  - validation_requirement
  - created_at
  - updated_at

properties:
  note_id:
    type: string
    format: uuid
    description: >
      Stable UUID for this dependency note.

  execution_id:
    type:
      - string
      - "null"
    format: uuid
    description: >
      Optional execution record UUID associated with this note.

  context_ref:
    type: object
    additionalProperties: false
    required:
      - project_id
      - session_id
      - cycle_id
      - run_id
    properties:
      project_id:
        type: string
        minLength: 1
      session_id:
        type: string
        minLength: 1
      cycle_id:
        type: string
        minLength: 1
      run_id:
        type: string
        minLength: 1
      task_node_id:
        type:
          - string
          - "null"
        format: uuid
      branch_id:
        type:
          - string
          - "null"
    description: >
      Minimal reference to the ExecutionContext that produced this note.

  source:
    type: object
    additionalProperties: false
    required:
      - source_agent_class
      - source_artifact
    properties:
      source_agent_class:
        type: string
        minLength: 1
        description: >
          Agent class or layer creating the dependency note.
        examples:
          - implementation_worker
          - supervisor
          - CDO-003
          - SLL-003
      source_assignment_id:
        type:
          - string
          - "null"
        format: uuid
      source_artifact:
        type: string
        minLength: 1
        description: >
          Artifact that produced or revealed the dependency.
        examples:
          - specs/SLL-003.md
          - schemas/execution-record.schema.yaml
      source_artifact_id:
        type:
          - string
          - "null"
        examples:
          - spec.SLL-003
          - schema.execution-record

  target:
    type: object
    additionalProperties: false
    required:
      - target_agent_class
      - target_artifact
    properties:
      target_agent_class:
        type: string
        minLength: 1
        description: >
          Agent class, layer, or owner expected to resolve the dependency.
        examples:
          - schema_worker
          - temporal_governance_worker
          - TGL-003
          - PCL-003
      target_assignment_id:
        type:
          - string
          - "null"
        format: uuid
      target_artifact:
        type: string
        minLength: 1
        description: >
          Artifact requiring change, validation, review, or ownership action.
        examples:
          - schemas/strategy-update-patch.schema.yaml
          - specs/TGL-003.md
      target_artifact_id:
        type:
          - string
          - "null"
        examples:
          - schema.strategy-update-patch
          - spec.TGL-003

  priority:
    type: string
    enum:
      - low
      - medium
      - high
      - blocking
    description: >
      Priority of the dependency note.

  blocking:
    type: boolean
    description: >
      If true, merge/release should not proceed until this note is resolved,
      superseded, rejected with recorded rationale, or explicitly overridden.

  dependency_type:
    type: string
    enum:
      - schema
      - interface
      - logic
      - validation
      - performance
      - policy
      - temporal
      - economic
      - collaboration
      - documentation
      - security
      - reproducibility
      - rollback
      - testing
      - artifact_boundary
      - other
    description: >
      Classification of dependency being requested.

  lifecycle_state:
    type: string
    enum:
      - open
      - acknowledged
      - deferred
      - resolved
      - superseded
      - rejected
      - escalated
      - archived
    description: >
      Current lifecycle state of the note.

  summary:
    type: string
    minLength: 1
    description: >
      One-sentence summary of the dependency.

  required_change:
    type: string
    minLength: 1
    description: >
      Specific change, review, decision, validation, or action required.

  justification:
    type: string
    minLength: 1
    description: >
      Why this dependency exists and why it matters.

  validation_requirement:
    type: string
    minLength: 1
    description: >
      How to verify that the dependency has been satisfied.

  acceptance_criteria:
    type: array
    items:
      type: string
    default: []
    description: >
      Optional concrete acceptance criteria for resolving this dependency.

  impact:
    type: object
    additionalProperties: false
    required:
      - affected_layers
      - affected_artifacts
      - risk_if_unresolved
    properties:
      affected_layers:
        type: array
        items:
          type: string
          enum:
            - LAPOP-003
            - CDO-003
            - PCL-003
            - SLL-003
            - EIL-003
            - CHL-003
            - TGL-003
            - CrossLayer
        default: []
      affected_artifacts:
        type: array
        items:
          type: string
        default: []
      downstream_blockers:
        type: array
        items:
          type: string
        default: []
      risk_if_unresolved:
        type: string
        enum:
          - none
          - low
          - medium
          - high
          - critical
          - unknown

  governance_flags:
    type: object
    additionalProperties: false
    required:
      - requires_policy_check
      - requires_supervisor_review
      - requires_human_review
      - requires_checkpoint
      - requires_revalidation
      - contamination_relevant
    properties:
      requires_policy_check:
        type: boolean
      requires_supervisor_review:
        type: boolean
      requires_human_review:
        type: boolean
      requires_checkpoint:
        type: boolean
      requires_revalidation:
        type: boolean
      contamination_relevant:
        type: boolean
      prevents_strategy_learning:
        type: boolean
        default: false
      prevents_trust_update:
        type: boolean
        default: false
      prevents_memory_write:
        type: boolean
        default: false

  resolution:
    type: object
    additionalProperties: false
    required:
      - resolved_by
      - resolution_summary
      - resolution_artifacts
      - rejection_reason
      - superseded_by_note_id
    properties:
      resolved_by:
        type:
          - string
          - "null"
        description: >
          Agent, human, or layer that resolved the note.
      resolution_summary:
        type:
          - string
          - "null"
      resolution_artifacts:
        type: array
        items:
          type: string
        default: []
      rejection_reason:
        type:
          - string
          - "null"
      superseded_by_note_id:
        type:
          - string
          - "null"
        format: uuid
      override_authorized_by:
        type:
          - string
          - "null"
      override_reason:
        type:
          - string
          - "null"

  history:
    type: array
    default: []
    items:
      type: object
      additionalProperties: false
      required:
        - update_id
        - previous_state
        - new_state
        - updated_by
        - rationale
        - timestamp
      properties:
        update_id:
          type: string
          format: uuid
        previous_state:
          type: string
        new_state:
          type: string
        updated_by:
          type: string
        rationale:
          type: string
        timestamp:
          type: string
          format: date-time

  temporal:
    type: object
    additionalProperties: false
    required:
      - age_cycles
      - ttl_cycles
      - stale
      - stale_reason
      - escalation_due_at
    properties:
      age_cycles:
        type: integer
        minimum: 0
        default: 0
      ttl_cycles:
        type:
          - integer
          - "null"
        minimum: 0
      stale:
        type: boolean
        default: false
      stale_reason:
        type:
          - string
          - "null"
      escalation_due_at:
        type:
          - string
          - "null"
        format: date-time
      archived_at:
        type:
          - string
          - "null"
        format: date-time

  created_at:
    type: string
    format: date-time

  updated_at:
    type: string
    format: date-time

  acknowledged_at:
    type:
      - string
      - "null"
    format: date-time

  resolved_at:
    type:
      - string
      - "null"
    format: date-time

  tags:
    type: array
    items:
      type: string
    default: []

examples:
  - note_id: "11111111-1111-4111-8111-111111111111"
    execution_id: null
    context_ref:
      project_id: lapop-agent-governance
      session_id: session-2026-04-27-a
      cycle_id: cycle-002-schema-normalization
      run_id: run-0001
      task_node_id: null
      branch_id: main
    source:
      source_agent_class: supervisor
      source_assignment_id: null
      source_artifact: schemas/execution-record.schema.yaml
      source_artifact_id: schema.execution-record
    target:
      target_agent_class: TGL-003
      target_assignment_id: null
      target_artifact: specs/TGL-003.md
      target_artifact_id: spec.TGL-003
    priority: high
    blocking: true
    dependency_type: rollback
    lifecycle_state: open
    summary: "Confirm rollback fields align with TGL rollback candidate requirements."
    required_change: >
      Ensure execution-record.schema.yaml exposes policy_attestation_id,
      strategy_ledger_head, checkpoint references, contamination_free, and
      rollback candidate linkage required by TGL.
    justification: >
      TGL rollback cannot restore full governance state unless execution records
      preserve policy and strategy state references.
    validation_requirement: >
      Verify that Execution_Record, CheckpointRecord, RollbackCandidate, and
      RollbackPlan schemas reference compatible policy and strategy fields.
    acceptance_criteria:
      - "Execution_Record includes policy_attestation_id or policy reference."
      - "Execution_Record includes strategy_ledger_head or strategy reference."
      - "RollbackCandidate can be generated from execution data."
    impact:
      affected_layers:
        - LAPOP-003
        - TGL-003
        - PCL-003
        - SLL-003
      affected_artifacts:
        - schemas/execution-record.schema.yaml
        - schemas/policy-attestation.schema.yaml
        - schemas/strategy-update-patch.schema.yaml
      downstream_blockers:
        - "full_state_rollback"
      risk_if_unresolved: high
    governance_flags:
      requires_policy_check: false
      requires_supervisor_review: true
      requires_human_review: false
      requires_checkpoint: false
      requires_revalidation: true
      contamination_relevant: false
      prevents_strategy_learning: false
      prevents_trust_update: false
      prevents_memory_write: false
    resolution:
      resolved_by: null
      resolution_summary: null
      resolution_artifacts: []
      rejection_reason: null
      superseded_by_note_id: null
      override_authorized_by: null
      override_reason: null
    history: []
    temporal:
      age_cycles: 0
      ttl_cycles: 3
      stale: false
      stale_reason: null
      escalation_due_at: null
      archived_at: null
    created_at: "2026-04-27T00:00:00Z"
    updated_at: "2026-04-27T00:00:00Z"
    acknowledged_at: null
    resolved_at: null
    tags:
      - rollback
      - cross-layer
      - schema
